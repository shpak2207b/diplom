version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: unixplus
      POSTGRES_USER: ${DB_USER:-unixplus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-unixplus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    environment:
      DATABASE_URL: postgresql://${DB_USER:-unixplus}:${DB_PASSWORD:-changeme}@postgres:5432/unixplus
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@unixplus.su}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-info@unixplus.su}
      NODE_ENV: development
      BACKEND_PORT: 3000
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_URL: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  pg_data:
